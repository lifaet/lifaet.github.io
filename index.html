<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
    <meta name="description" content="" />
    <meta name="keywords" content="" />
    <meta name="author" content="" />
    <link rel="icon" href="./assets/images/favicon.ico">
    <title></title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./assets/css/index.css">
    <script src="./assets/js/scrolling.js"></script>
</head>

<body>
    <div class="container">
        <!-- Desktop Sidebar -->
        <div class="sidebar">
            <!-- Profile Section -->
            <div class="profile">
                <a href="./" class="profile-link">
                    <div class="profile-image">
                        <img src="" alt="">
                    </div>
                    <h3 class="profile-name"></h3>
                </a>
            </div>

            <!-- Menu Buttons -->
            <button class="menu-btn active" data-page="home">
                <i></i>
                <span></span>
            </button>
            <button class="menu-btn" data-page="experience">
                <i></i>
                <span></span>
            </button>
            <button class="menu-btn" data-page="education">
                <i></i>
                <span></span>
            </button>
            <button class="menu-btn" data-page="skills">
                <i></i>
                <span></span>
            </button>
            <button class="menu-btn" data-page="projects">
                <i></i>
                <span></span>
            </button>
            <button class="menu-btn" data-page="contact">
                <i></i>
                <span></span>
            </button>

            <!-- Copyright Section -->
            <div class="copyright">
                <p></p>
                <p>All Rights Reserved</p>
            </div>
        </div>

        <!-- Mobile Navigation -->
        <div class="mobile-nav">
            <div class="mobile-profile">
                <a href="./" class="mobile-profile-link">
                    <img src="" alt="">
                    <span></span>
                </a>
            </div>
        </div>

        <!-- Mobile Bottom Navigation -->
        <nav class="mobile-bottom-nav">
            <button class="nav-btn active" data-page="home">
                <i></i>
                <span></span>
            </button>
            <button class="nav-btn" data-page="experience">
                <i></i>
                <span></span>
            </button>
            <button class="nav-btn" data-page="education">
                <i></i>
                <span></span>
            </button>
            <button class="nav-btn" data-page="skills">
                <i></i>
                <span></span>
            </button>
            <button class="nav-btn" data-page="projects">
                <i></i>
                <span></span>
            </button>
            <button class="nav-btn" data-page="contact">
                <i></i>
                <span></span>
            </button>
        </nav>

        <!-- Content Area -->
        <div class="content">
            <div id="home" class="page active">
                <div class="home-content">
                    <div class="intro-text"></div>
                    <div class="social-links"></div>
                </div>
            </div>

            <div id="experience" class="page">
                <div class="page-title">
                    <h2>EXPERIENCE</h2>
                    <div class="title-bar"></div>
                </div>

                <div class="timeline-container">
                    <div class="timeline-grid"></div>
                </div>
            </div>

            <div id="education" class="page">
                <div class="page-title">
                    <h2>EDUCATION</h2>
                    <div class="title-bar"></div>
                </div>

                <div class="education-container">
                    <!-- Academic Background -->
                    <div class="education-grid"></div>

                    <!-- Certifications -->
                    <div class="certifications">
                        <div class="page-title">
                            <h2>Certifications</h2>
                            <div class="title-bar"></div>
                        </div>

                        <div class="cert-grid"></div>
                    </div>
                </div>
            </div>

            <div id="skills" class="page">
                <div class="page-title">
                    <h2>SKILL</h2>
                    <div class="title-bar"></div>
                </div>

                <div class="skills-container">
                    <div class="skills-grid"></div>
                </div>
            </div>

            <div id="projects" class="page">
                <div class="page-title">
                    <h2>PROJECT</h2>
                    <div class="title-bar"></div>
                </div>

                <div class="projects-container">
                    <div class="project-filters"></div>
                    <div class="projects-grid"></div>
                </div>
            </div>


            <div id="contact" class="page">
                <div class="page-title">
                    <h2>CONTACT</h2>
                    <div class="title-bar"></div>
                </div>

                <div class="contact-container">
                    <div class="contact-grid">
                        <!-- Left Column: Contact Info & CV Form -->
                        <div class="contact-left">
                            <!-- Contact Info Cards -->
                            <div class="contact-info"></div>

                            <!-- CV Download Section -->
                            <div id="cv" class="cv-section">
                                <h3>Download CV</h3>
                                <form class="cv-form" id="cvForm">
                                    <div class="form-group">
                                        <input type="text" id="cvName" name="CV-Name" required>
                                        <label for="cvName">Your Name</label>
                                    </div>
                                    <div class="form-group">
                                        <input type="email" id="cvEmail" name="CV-Email" required>
                                        <label for="cvEmail">Your Email</label>
                                    </div>
                                    <button type="submit" class="cv-btn">
                                        <span>Download CV</span>
                                        <i class="fas fa-file-pdf"></i>
                                    </button>
                                </form>
                            </div>
                        </div>
                        <!-- Right Column: Contact Form -->
                        <div class="contact-right">
                            <div class="contact-form-container">
                                <h3>Send Message</h3>
                                <div id="show_contact_msg"></div>
                                <form class="contact-form" id="contactForm" method="POST">
                                    <div class="form-group">
                                        <input type="text" id="name" name="Contact-Name" required>
                                        <label for="name">Your Name</label>
                                    </div>
                                    <div class="form-group">
                                        <input type="email" id="email" name="Contact-Email" required>
                                        <label for="email">Your Email</label>
                                    </div>
                                    <div class="form-group">
                                        <textarea id="message" name="Message" required></textarea>
                                        <label for="message">Message</label>
                                    </div>
                                    <button type="submit" class="submit-btn" id="submit-button">
                                        <span>Send Message</span>
                                        <i class="fas fa-paper-plane"></i>
                                    </button>
                                </form>
                            </div>
                        </div>
                    </div>

                    <!-- Map Section -->
                    <div class="map-section">
                        <iframe
                            src=""
                            width="100%" height="350" style="border:0;" allowfullscreen="" loading="lazy"
                            referrerpolicy="no-referrer-when-downgrade">
                        </iframe>
                    </div>
                </div>

                <div class="social-links"></div>
            </div>
        </div>
    </div>

    <script src="./assets/js/index.js"></script>
</body>

</html>
