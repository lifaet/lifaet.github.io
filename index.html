<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name=description content="Lifaet Hossain Zim - Welcome">
  <meta name=keywords content="Md, Lifaet, Hossain, Zim, Md Lifaet Hossain Zim, Lifaet Hossain">
  <meta name=author content="Lifaet Hossain Zim">
  <link rel=icon href=./assets/images/favicon.ico>
  <title>Lifaet Hossain Zim - Welcome</title>
  <link rel="icon" href="./assets/images/favicon.ico">
  <title>Portfolio</title>

  <!-- Font Awesome -->
  <link rel="stylesheet" href="./assets/css/font-awesome.css">
  <link rel="stylesheet" href="./assets/css/index.css">
</head>

<body>

  <!-- ─── Loading / Error Overlay ─────────────────────── -->
  <div id="app-overlay" class="app-overlay">
    <div class="app-overlay-box">
      <div class="app-spinner" id="app-spinner"></div>
      <p id="app-overlay-text">Loading ...</p>
      <button id="app-retry-btn" class="btn-primary" style="display:none;">Retry</button>
    </div>
  </div>

  <div class="container" id="app-container" style="display:none;">

    <!-- ─── Desktop Sidebar ─────────────────────────────── -->
    <aside class="sidebar" aria-label="Site navigation">
      <div class="profile">
        <a href="./" class="profile-link" aria-label="Home">
          <div class="profile-image"></div>
          <h3 class="profile-name"></h3>
        </a>
      </div>
      <!-- Nav buttons injected by JS -->
      <div class="copyright">
        <p></p>
        <p>All Rights Reserved</p>
      </div>
    </aside>

    <!-- ─── Mobile Top Bar ──────────────────────────────── -->
    <header class="mobile-nav" aria-label="Mobile header">
      <div class="mobile-profile">
        <a href="./" class="mobile-profile-link" aria-label="Home">
          <img src="" alt="">
          <span class="mobile-profile-name"></span>
        </a>
      </div>
    </header>

    <!-- ─── Mobile Bottom Nav ───────────────────────────── -->
    <nav class="mobile-bottom-nav" aria-label="Mobile navigation">
      <!-- Nav buttons injected by JS -->
    </nav>

    <!-- ─── Main Content ────────────────────────────────── -->
    <main class="content">

      <!-- Home -->
      <section id="home" class="page active" aria-label="Home">
        <div class="home-content">
          <div class="intro-text"></div>
          <div class="social-links"></div>
        </div>
      </section>

      <!-- Experience -->
      <section id="experience" class="page" aria-label="Experience">
        <div class="page-title">
          <h2>Experience</h2>
          <div class="title-bar"></div>
        </div>
        <div class="timeline-container">
          <div class="timeline-grid"></div>
        </div>
      </section>

      <!-- Education -->
      <section id="education" class="page" aria-label="Education">
        <div class="page-title">
          <h2>Education</h2>
          <div class="title-bar"></div>
        </div>
        <div class="education-container">
          <div class="education-grid"></div>
          <div class="certifications">
            <div class="page-title">
              <h2>Certifications</h2>
              <div class="title-bar"></div>
            </div>
            <div class="cert-grid"></div>
          </div>
        </div>
      </section>

      <!-- Skills -->
      <section id="skills" class="page" aria-label="Skills">
        <div class="page-title">
          <h2>Skills</h2>
          <div class="title-bar"></div>
        </div>
        <div class="skills-container">
          <div class="skill-filters"></div>
          <div class="skills-grid"></div>
          <div class="languages-section">
            <div class="page-title">
              <h2>Languages</h2>
              <div class="title-bar"></div>
            </div>
            <div class="languages-grid"></div>
          </div>
        </div>
      </section>

      <!-- Projects -->
      <section id="projects" class="page" aria-label="Projects">
        <div class="page-title">
          <h2>Projects</h2>
          <div class="title-bar"></div>
        </div>
        <div class="projects-container">
          <div class="project-filters"></div>
          <div class="projects-grid view-grid"></div>
        </div>
      </section>

      <!-- Contact -->
      <section id="contact" class="page" aria-label="Contact">
        <div class="page-title">
          <h2>Contact</h2>
          <div class="title-bar"></div>
        </div>

        <div class="contact-container">
          <div class="contact-grid">

            <!-- Left: Info + CV -->
            <div class="contact-left">
              <div class="contact-info"></div>

              <div id="cv" class="cv-section">
                <h3>Download CV</h3>
                <div id="show_cv_msg" role="status" aria-live="polite"></div>
                <form class="cv-form" id="cvForm">
                  <div class="form-group">
                    <input type="text" id="cvName" name="CV-Name" placeholder=" " required>
                    <label for="cvName">Your Name</label>
                  </div>
                  <div class="form-group">
                    <input type="email" id="cvEmail" name="CV-Email" placeholder=" " required>
                    <label for="cvEmail">Your Email</label>
                  </div>
                  <button type="submit" class="cv-btn">
                    <span>Download CV</span>
                    <i class="fa-solid fa-file-pdf" aria-hidden="true"></i>
                  </button>
                </form>
              </div>
            </div>

            <!-- Right: Contact Form -->
            <div class="contact-right">
              <div class="contact-form-container">
                <h3>Send a Message</h3>
                <div id="show_contact_msg" role="status" aria-live="polite"></div>
                <form class="contact-form" id="contactForm">
                  <div class="form-group">
                    <input type="text" id="name" name="Contact-Name" placeholder=" " required>
                    <label for="name">Your Name</label>
                  </div>
                  <div class="form-group">
                    <input type="email" id="email" name="Contact-Email" placeholder=" " required>
                    <label for="email">Your Email</label>
                  </div>
                  <div class="form-group">
                    <textarea id="message" name="Message" placeholder=" " required></textarea>
                    <label for="message">Message</label>
                  </div>
                  <button type="submit" class="submit-btn" id="submit-button">
                    <span>Send Message</span>
                    <i class="fa-solid fa-paper-plane" aria-hidden="true"></i>
                  </button>
                </form>
              </div>
            </div>
          </div>

          <!-- Map -->
          <div class="map-section">
            <iframe src="" width="100%" height="350" style="border:0;" allowfullscreen="" loading="lazy"
              referrerpolicy="no-referrer-when-downgrade" title="Location map">
            </iframe>
          </div>
        </div>

        <div class="social-links"></div>
      </section>

    </main>
  </div>

  <script src="./assets/js/index.js"></script>
</body>

</html>
